  }
}

// ── 3.8h  Style M — CONTAGION (black bg, pixels light up + spread) ────────────
// Cellular automaton: infected cells spread to 4-neighbours each frame, painting
// the real image colour sampled at that location onto a black field. Random +
// touch seeds. A clean wave periodically sweeps from the borders inward.
const CONT = {
  W:0, H:0,
  state:   null,
  colR:    null, colG:null, colB:null,
  resetT:  0, resetActive:false, resetProg:0,
  seedT:   0,
};
function _initContagion(){
  const cw=Math.min(140,PROC_W), ch=Math.round(cw*PROC_H/PROC_W);
  CONT.W=cw; CONT.H=ch; const n=cw*ch;
  CONT.state=new Uint8Array(n);
  CONT.colR=new Uint8Array(n); CONT.colG=new Uint8Array(n); CONT.colB=new Uint8Array(n);
}
function _contSeed(nx, ny, fd){
  if (nx<0||ny<0||nx>=CONT.W||ny>=CONT.H) return;
  const i=ny*CONT.W+nx; CONT.state[i]=1;
  const fpx=Math.min(PROC_W-1,(nx/CONT.W*PROC_W)|0), fpy=Math.min(PROC_H-1,(ny/CONT.H*PROC_H)|0);
  const fi=(fpy*PROC_W+fpx)*4;
  CONT.colR[i]=fd[fi]; CONT.colG[i]=fd[fi+1]; CONT.colB[i]=fd[fi+2];
}
function drawStyleM(ctx, cW, cH, now){
  if (!_effectCtx) return;
  if (!CONT.state||CONT.W===0) _initContagion();
  _effectCtx.drawImage(sourceFrame(),_crop.sx,_crop.sy,_crop.sw,_crop.sh,0,0,PROC_W,PROC_H);
  let fd; try{ fd=_effectCtx.getImageData(0,0,PROC_W,PROC_H).data; }catch(e){ return; }
  const W=CONT.W, H=CONT.H, st=CONT.state;

  if (now-CONT.seedT>240){
    CONT.seedT=now;
    for (let s=0;s<CFG.contSeeds;s++) _contSeed((Math.random()*W)|0,(Math.random()*H)|0,fd);
  }
  // Touch wipes the field and restarts a fresh outbreak from the touch point.
  if (TOUCH.active && !CONT._touchLatch){
    CONT._touchLatch = true;             // one reset per touch (not every frame)
    st.fill(0);                          // clear everything
    CONT.resetActive = false;
    const tx=((TOUCH.x/cW)*W)|0, ty=((TOUCH.y/cH)*H)|0;
    for (let k=0;k<6;k++) _contSeed(tx+((Math.random()*4-2)|0),ty+((Math.random()*4-2)|0),fd);
  }
  if (!TOUCH.active) CONT._touchLatch = false;

  const spreadP=CFG.contSpread/100;
  for (let y=0;y<H;y++){
    for (let x=0;x<W;x++){
      const i=y*W+x; if(!st[i])continue;
      if (x>0   && !st[i-1] && Math.random()<spreadP) _contSeed(x-1,y,fd);
      if (x<W-1 && !st[i+1] && Math.random()<spreadP) _contSeed(x+1,y,fd);
      if (y>0   && !st[i-W] && Math.random()<spreadP) _contSeed(x,y-1,fd);
      if (y<H-1 && !st[i+W] && Math.random()<spreadP) _contSeed(x,y+1,fd);
    }
  }

  if (!CONT.resetActive && now-CONT.resetT>CFG.contReset*1000){
    CONT.resetActive=true; CONT.resetProg=0; CONT.resetT=now;
  }
  if (CONT.resetActive){
    CONT.resetProg+=0.018;
    // Soft vignette reset: clear cells whose normalized distance from centre is
    // beyond a shrinking radius, with a feathered edge (probabilistic clear in
    // the feather band) so the wipe reads as a smooth closing vignette.
    const cxn=W*0.5, cyn=H*0.5;
    const maxR=Math.sqrt(cxn*cxn+cyn*cyn);
    const ringR=maxR*(1-CONT.resetProg);   // radius shrinks toward centre
    const feather=maxR*0.18;
    for (let y=0;y<H;y++){
      for (let x=0;x<W;x++){
        const i=y*W+x; if(!st[i])continue;
        const dx=x-cxn, dy=y-cyn, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>ringR+feather) st[i]=0;                       // fully cleared zone
        else if (dist>ringR && Math.random()<((dist-ringR)/feather)) st[i]=0; // feather
      }
    }
    if (CONT.resetProg>=1) CONT.resetActive=false;
  }

  ctx.fillStyle='#050508'; ctx.fillRect(0,0,cW,cH);
  const sw=cW/W, sh=cH/H;
  ctx.imageSmoothingEnabled=false;
  for (let y=0;y<H;y++){
    for (let x=0;x<W;x++){
      const i=y*W+x; if(!st[i])continue;
      ctx.fillStyle='rgb('+CONT.colR[i]+','+CONT.colG[i]+','+CONT.colB[i]+')';
      ctx.fillRect(x*sw,y*sh,Math.ceil(sw),Math.ceil(sh));
    }
  }
  ctx.imageSmoothingEnabled=true;
}

// ── 3.8i  Style N — ASCII MONO (grayscale photo + warm ASCII over highlights) ─
// Greyscale base, dark. ASCII glyphs (warm orange) overlay the brighter regions
// of the subject, denser where it's lighter — like the orchid reference.
const _AMONO_RAMP = " .'`^,:!-+*o0#$%&@";  // dark→bright glyph density
function drawStyleN(ctx, cW, cH){
  if (!_effectCtx) return;
  // Greyscale base
  _effectCtx.drawImage(sourceFrame(), _crop.sx,_crop.sy,_crop.sw,_crop.sh, 0,0,PROC_W,PROC_H);
  let img; try{ img=_effectCtx.getImageData(0,0,PROC_W,PROC_H); }catch(e){ return; }
  const px=img.data;
  // draw greyscale to composite first
  for (let i=0;i<px.length;i+=4){
    const g=(px[i]*0.299+px[i+1]*0.587+px[i+2]*0.114)|0;
    px[i]=px[i+1]=px[i+2]=g;
  }
  _effectCtx.putImageData(img,0,0);
  ctx.fillStyle='#0e0e10'; ctx.fillRect(0,0,cW,cH);
  ctx.imageSmoothingEnabled=false;
  ctx.globalAlpha=0.92;
  ctx.drawImage(_effectCanvas,0,0,cW,cH);
  ctx.globalAlpha=1;

  // ASCII overlay (warm orange) over bright regions
  const cell=Math.max(6,(CFG.asciiCell|0)+3);   // share J's Cell Size slider
  const cols=(cW/cell)|0, rows=(cH/cell)|0;
  const sx=PROC_W/cW, sy=PROC_H/cH;
  ctx.fillStyle='#ff7a1e';   // warm orange
  ctx.textBaseline='top';
  ctx.font='700 '+(cell)+'px Helvetica,Arial,sans-serif';
  const thr=CFG.amonoThresh*2.55;   // 0..100 → 0..255
  for (let r=0;r<rows;r++){
    const py=((r*cell)*sy)|0; if(py>=PROC_H)break;
    const prow=py*PROC_W;
    for (let c=0;c<cols;c++){
      const pxc=((c*cell)*sx)|0; if(pxc>=PROC_W)continue;
      const g=_grayBuf[prow+pxc];
      if (g<thr) continue;                    // only lit regions get glyphs
      const lvl=((g-thr)/(255-thr)*(_AMONO_RAMP.length-1))|0;
      const ch=_AMONO_RAMP[Math.max(0,Math.min(_AMONO_RAMP.length-1,lvl))];
      if (ch===' ') continue;
      // slight alpha variation by brightness
      ctx.globalAlpha=0.45+0.5*(g/255);
      ctx.fillText(ch, c*cell, r*cell);
    }
  }
  ctx.globalAlpha=1;
  ctx.textBaseline='alphabetic';
}

// ── 3.8k  Style P — THERMAL (luminance → infrared palette) ────────────────────
// Maps brightness onto a thermal ramp (black→purple→magenta→red→orange→yellow→
// white). Reads the downsampled frame at PROC res, paints scaled-up blocks.
// Thermal lookup table (256 entries) built once.
// Thermal palette bank — each entry is a 256×3 LUT built from colour stops.
function _buildLut(stops){
  const lut=new Uint8Array(256*3);
  for(let i=0;i<256;i++){
    const t=i/255;
    let a=stops[0], b=stops[stops.length-1];
    for(let s=0;s<stops.length-1;s++){ if(t>=stops[s][0]&&t<=stops[s+1][0]){a=stops[s];b=stops[s+1];break;} }
    const span=(b[0]-a[0])||1, f=(t-a[0])/span;
    lut[i*3]  =(a[1]+(b[1]-a[1])*f)|0;
    lut[i*3+1]=(a[2]+(b[2]-a[2])*f)|0;
    lut[i*3+2]=(a[3]+(b[3]-a[3])*f)|0;
  }
  return lut;
}
const _THERMAL_LUTS = [
  // 0 IRON (classic infrared)
  _buildLut([[0,5,4,16],[0.18,40,8,90],[0.38,150,12,150],[0.55,235,30,60],[0.72,255,130,10],[0.88,255,235,60],[1,255,255,255]]),
  // 1 JET (rainbow science-viz)
  _buildLut([[0,0,0,130],[0.25,0,120,255],[0.5,40,255,40],[0.75,255,220,0],[1,255,20,10]]),
  // 2 ARCTIC (deep blue → cyan → white)
  _buildLut([[0,4,8,30],[0.35,10,60,160],[0.65,30,180,230],[0.85,160,240,250],[1,255,255,255]]),
  // 3 NIGHT VISION (black → green → white)
  _buildLut([[0,0,8,0],[0.45,10,140,30],[0.8,90,255,110],[1,235,255,235]]),
  // 4 X-RAY (inverted blue-white negative)
  _buildLut([[0,240,248,255],[0.4,140,180,220],[0.75,40,70,130],[1,4,8,24]]),
];
function drawStyleP(ctx, cW, cH){
  if(!_effectCtx) return;
  const _LUT=_THERMAL_LUTS[CFG.thermalPalette] || _THERMAL_LUTS[0];
  drawFilterSource(_effectCtx, cW, cH);
  let img; try{ img=_effectCtx.getImageData(0,0,PROC_W,PROC_H); }catch(e){ return; }
  const px=img.data;
  for(let i=0;i<px.length;i+=4){
    let g=(px[i]*0.299+px[i+1]*0.587+px[i+2]*0.114)|0;
    // optional contrast boost so heat zones pop
    g=Math.max(0,Math.min(255,(g-90)*1.4+90))|0;
    const li=g*3;
    px[i]=_LUT[li]; px[i+1]=_LUT[li+1]; px[i+2]=_LUT[li+2];
  }
  _effectCtx.putImageData(img,0,0);
  ctx.imageSmoothingEnabled=(CFG.thermalSmooth===1);
  ctx.drawImage(_effectCanvas,0,0,cW,cH);
  ctx.imageSmoothingEnabled=true;
}

// ── 3.8l  Style Q — WAVEFIELD (water-mirror ripple distortion) ────────────────
// Each tracked blob is a ripple source on a water surface: expanding waves
// DISPLACE the image pixels, and waves from different sources interfere
// (amplitudes sum) like on a real pond. Computed at reduced resolution on
// pre-allocated buffers, then scaled up with smoothing for a liquid look.
const RIP = { W:0, H:0, srcCanvas:null, srcCtx:null, outCanvas:null, outCtx:null, outImg:null };
function _initRipple(cW, cH){
  const w = STATE.isRecording ? 128 : 180, h = Math.max(72, Math.round(w * cH / cW));
  RIP.W=w; RIP.H=h;
  if(!RIP.srcCanvas){
    RIP.srcCanvas=document.createElement('canvas'); RIP.srcCtx=RIP.srcCanvas.getContext('2d',{willReadFrequently:true});
    RIP.outCanvas=document.createElement('canvas'); RIP.outCtx=RIP.outCanvas.getContext('2d');
  }
  RIP.srcCanvas.width=w;  RIP.srcCanvas.height=h;
  RIP.outCanvas.width=w;  RIP.outCanvas.height=h;
  RIP.outImg=RIP.outCtx.createImageData(w,h);
}
function drawStyleQ(ctx, cW, cH, now){
  const _tw=STATE.isRecording?128:180, _th=Math.max(72,Math.round(_tw*cH/cW));
  if(!RIP.srcCanvas || RIP.W!==_tw || RIP.H!==_th) _initRipple(cW,cH);
  const W=RIP.W, H=RIP.H;
  // 1. current frame at ripple resolution
  RIP.srcCtx.drawImage(sourceFrame(), _crop.sx,_crop.sy,_crop.sw,_crop.sh, 0,0,W,H);
  let sImg; try{ sImg=RIP.srcCtx.getImageData(0,0,W,H); }catch(e){ return; }
  const sd=sImg.data, od=RIP.outImg.data;

  // 2. ripple sources: active blobs mapped to ripple-space (max 5); if none,
  //    a gentle ambient source keeps the surface alive.
  const sx=[], sy=[];
  const _maxSrc = STATE.isRecording ? 3 : 5;
  for(let ti=0;ti<MAX_TRACKED && sx.length<_maxSrc;ti++){
    const t=_tracked[ti];
    if(t.active && t.age>=2){ sx.push(t.scx/cW*W); sy.push(t.scy/cH*H); }
  }
  if(sx.length===0){ sx.push(W*0.5 + Math.sin(now/2400)*W*0.2); sy.push(H*0.5 + Math.cos(now/3100)*H*0.2); }
  const nS=sx.length;

  const t=now/1000;
  const lam=Math.max(6, CFG.waveLen*W/900);      // wavelength in ripple px
  const omega=CFG.waveSpeed/10;                   // temporal frequency
  // Amplitude is pushed hard: quadratic scaling so high "Depth" truly shreds the
  // image. Falloff is gentler so waves travel far and interfere destructively.
  const amp=(CFG.waveAmp*CFG.waveAmp)*W/2400;
  const k=(Math.PI*2)/lam;
  const CA=Math.min(6, amp*0.5);                   // chromatic-aberration split (px)

  // 3. per-pixel displacement: sum of radial waves from each source.
  //    R/G/B are sampled at slightly different displaced positions → the ridges
  //    of each wave tear into colour fringes, like light refracting through
  //    disturbed water.
  for(let y=0;y<H;y++){
    const row=y*W;
    for(let x=0;x<W;x++){
      let ox=0, oy=0, shade=0, grad=0;
      for(let s=0;s<nS;s++){
        const dx=x-sx[s], dy=y-sy[s];
        const dist=Math.sqrt(dx*dx+dy*dy)+0.0001;
        const fall=1/(1+dist*0.020);               // slower falloff → waves reach further
        const phase=dist*k - t*omega*6;
        const w=Math.cos(phase)*fall;              // wave height (interferes by summing)
        const dw=-Math.sin(phase)*k*fall;          // spatial gradient → steep ridges push more
        const g=(w+dw*0.6)*amp/dist;               // displacement, biased by slope
        ox+=dx*g; oy+=dy*g; shade+=w; grad+=Math.abs(dw);
      }
      // chromatic split along the displacement direction
      const mag=Math.sqrt(ox*ox+oy*oy)+0.0001;
      const nx=ox/mag, ny=oy/mag;
      const caX=nx*CA, caY=ny*CA;

      // clamp helper inline
      let bx=x+ox, by=y+oy;
      if(bx<0)bx=0; else if(bx>W-1)bx=W-1;
      if(by<0)by=0; else if(by>H-1)by=H-1;
      // R sampled ahead, B sampled behind → colour fringe on ridges
      let rx=x+ox+caX, ry=y+oy+caY;
      if(rx<0)rx=0; else if(rx>W-1)rx=W-1;
      if(ry<0)ry=0; else if(ry>H-1)ry=H-1;
      let bbx=x+ox-caX, bby=y+oy-caY;
      if(bbx<0)bbx=0; else if(bbx>W-1)bbx=W-1;
      if(bby<0)bby=0; else if(bby>H-1)bby=H-1;

      const siR=(((ry|0)*W)+(rx|0))*4;
      const siG=(((by|0)*W)+(bx|0))*4;
      const siB=(((bby|0)*W)+(bbx|0))*4;
      const oi=(row+x)*4;
      // specular glint on steep ridges
      const l=1+shade*0.20+grad*0.05;
      let r=sd[siR]*l, gch=sd[siG+1]*l, b=sd[siB+2]*l;
      od[oi]  = r>255?255:r;
      od[oi+1]= gch>255?255:gch;
      od[oi+2]= b>255?255:b;
      od[oi+3]=255;
    }
  }
  RIP.outCtx.putImageData(RIP.outImg,0,0);
  // 4. scale up with smoothing → liquid look
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(RIP.outCanvas,0,0,cW,cH);
}

// Brief zoom-level badge shown while/just after pinching.
function drawZoomBadge(ctx, cW, cH, now){
  if (STATE.isRecording) return;
  const age = now - ZOOM.lastShown;
  if (ZOOM.factor<=1.001 || age>1200) return;
  const fade = age>800 ? 1-(age-800)/400 : 1;
  ctx.save();
  ctx.globalAlpha = Math.max(0,fade);
  ctx.font='900 22px Helvetica,Arial,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const txt=ZOOM.factor.toFixed(1)+'\u00d7';
  ctx.fillStyle='rgba(5,5,8,0.55)';
  const w=72,h=40;
  ctx.fillRect(cW*0.5-w/2, cH*0.18-h/2, w, h);
  ctx.fillStyle='#ffffff';
  ctx.fillText(txt, cW*0.5, cH*0.18);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawHUD(ctx, cW, cH) {
  // Minimal UX: no on-canvas text, no meters, no step dots.
  // (Style overlays already include any diegetic labels they need.)
  // REC indicator dot only — small, top-right, never during the actual frame capture
  // is fine to show since user wants clean recordings handled elsewhere.
  return;
}

// ── 3.9  Main animation loop ──────────────────────────────────────────────────
function loop(now) {
  rafId = requestAnimationFrame(loop);
  if (!STATE.cameraOk || (!STILL.active && videoEl.readyState < 2)) return;
  STATE.fpsFrames++;
  if (now-STATE.fpsT>=1000){STATE.fps=STATE.fpsFrames;STATE.fpsFrames=0;STATE.fpsT=now;}
  if (STATE.perfOn){
    const dt = now - (STATE._perfPrev||now); STATE._perfPrev = now;
    STATE.frameMs = dt;
    STATE.frameMsEMA += (dt - STATE.frameMsEMA) * 0.12;   // smoothed, zero-GC
    if (_perfHud) _perfHud.textContent =
      STATE.fps+'fps  '+STATE.frameMsEMA.toFixed(1)+'ms  '+cW+'x'+cH+'  proc:'+PROC_W+'x'+PROC_H;
  }
  const cW=compositeCanvas.width, cH=compositeCanvas.height;
  if (!_crop.valid) updateCrop(STATE.videoW,STATE.videoH,cW,cH);

  // A. Base layer + MIX compositing.
  //    Four cases, from two facts (tracker vs graphic for each layer, and whether
  //    the active graphic is an image FILTER):
  //      1. active TRACKER + any mix → mix is the base (drawn now); the active
  //         tracker annotates on top later in the switch.  (_underMix)
  //      2. active FILTER graphic (THERMAL/PXSORT) + tracker mix → draw frame +
  //         tracker now, then the filter reads the COMPOSITE and recolors it all,
  //         so e.g. THERMAL tints ORBIT's strokes too.  (_filterComposite)
  //      3. active generative graphic + tracker mix → tracker drawn ON TOP after
  //         the switch (generative styles can't filter it).  (_mixOnTop)
  //      4. graphic + graphic mix → mix under, active paints over.  (_underMix)
  const _mixOn = mixIsValid();
  const _mixIsTracker    = _mixOn && STYLE_KIND[CFG.mixStyle]==='tracker';
  const _activeIsTracker = STYLE_KIND[CFG.style]==='tracker';
  const _selfBg = (CFG.style==='C'||CFG.style==='L'||CFG.style==='M'||CFG.style==='P'||CFG.style==='Q');
  _underMix = false; _filterComposite = false;
  let _mixOnTop = false;
  if (_mixOn && _activeIsTracker) {
    try { MIX_DRAW[CFG.mixStyle](compositeCtx,cW,cH,now); } catch(e){}   // case 1
    _underMix = true;
  } else if (_mixOn && _mixIsTracker && FILTER_GRAPHICS[CFG.style]) {     // case 2
    compositeCtx.drawImage(sourceFrame(),_crop.sx,_crop.sy,_crop.sw,_crop.sh,0,0,cW,cH);
    try { MIX_DRAW[CFG.mixStyle](compositeCtx,cW,cH,now); } catch(e){}
    _filterComposite = true;
  } else if (_mixOn && _mixIsTracker) {                                  // case 3
    if (!_selfBg) compositeCtx.drawImage(sourceFrame(),_crop.sx,_crop.sy,_crop.sw,_crop.sh,0,0,cW,cH);
    _mixOnTop = true;
  } else if (_mixOn) {                                                   // case 4
    try { MIX_DRAW[CFG.mixStyle](compositeCtx,cW,cH,now); } catch(e){}
    _underMix = true;
  } else if (!_selfBg) {
    compositeCtx.drawImage(sourceFrame(),_crop.sx,_crop.sy,_crop.sw,_crop.sh,0,0,cW,cH);
  }
  // B. Vignette (skip for C/D/E/F which manage their own backgrounds)
  if (CFG.showVignette && CFG.style==='A' || CFG.showVignette && CFG.style==='B') {
    drawVignette(compositeCtx,cW,cH);
  }
  // C. Touch timeout
  if (TOUCH.active && now-TOUCH.lastT>TOUCH.timeout) TOUCH.active=false;
  // D. Neural orbit update (every rAF for smooth motion)
  if (CFG.style==='D') updateNeuralNodes(now);

  // E. Detection (throttled to DETECT_INTERVAL_MS)
  if (now-STATE.lastDetectT >= DETECT_INTERVAL_MS) {
    STATE.lastDetectT=now;
    workCtx.drawImage(sourceFrame(),_crop.sx,_crop.sy,_crop.sw,_crop.sh,0,0,PROC_W,PROC_H);
    const imgData=workCtx.getImageData(0,0,PROC_W,PROC_H);
    toGrayscale(imgData.data,_grayBuf,PROC_N);
    if (STATE.warmup>=2) {
      computeMaskEroded(_grayBuf,_prevGrayBuf,_rawMaskBuf,_maskBuf,
                        PROC_N,PROC_W,PROC_H,CFG.motionThresh,CFG.brightThresh);
      computeDepthMap();
      const labelCount=labelCC(_maskBuf,_labelBuf,_bfsQueue,PROC_W,PROC_H);
      extractRawBlobs(labelCount,cW/PROC_W,cH/PROC_H,CFG.minArea,CFG.maxArea);
      updateTracked();
      if (CFG.style==='C') sampleGhostParticles(cW/PROC_W,cH/PROC_H);
    } else { STATE.warmup++; }
    copyBuf(_grayBuf,_prevGrayBuf,PROC_N);
  }

  // F. Draw visual overlay
  switch (CFG.style) {
    case 'A': drawStyleA(compositeCtx,cW,cH);       break;
    case 'B': drawStyleB(compositeCtx,cW,cH);       break;
    case 'C': drawStyleC(compositeCtx,cW,cH,now);   break;
    case 'D': drawStyleD(compositeCtx,cW,cH,now);   break;
    case 'F': drawStyleF(compositeCtx,cW,cH);       break;
    case 'H': drawStyleH(compositeCtx,cW,cH);       break;
    case 'I': drawStyleI(compositeCtx,cW,cH);       break;
    case 'J': drawStyleJ(compositeCtx,cW,cH);       break;
    case 'L': drawStyleL(compositeCtx,cW,cH);       break;
    case 'M': drawStyleM(compositeCtx,cW,cH,now);   break;
    case 'P': drawStyleP(compositeCtx,cW,cH);       break;
    case 'Q': drawStyleQ(compositeCtx,cW,cH,now);   break;
  }

  // G. Case 3 — a tracker mix over a generative graphic is drawn ON TOP here,
  //    so its annotations sit above the graphic instead of being covered.
  if (_mixOnTop) {
    _underMix = true;   // MOSAIC uses the already-painted canvas as its base
    try { MIX_DRAW[CFG.mixStyle](compositeCtx,cW,cH,now); } catch(e){}
  }

  // Noise overlay (on top of style, under HUD)
  if (CFG.noise > 0) drawNoise(compositeCtx, cW, cH, CFG.noise);
  drawZoomBadge(compositeCtx, cW, cH, now);

  // Audio engine update — drives drums from blob motion
  updateAudio(cW,cH,now);

  // H. Touch reticle + HUD (both suppressed when recording)
  if (!STATE.isRecording) drawTouchReticle(compositeCtx);
  drawHUD(compositeCtx,cW,cH);
}

// ── 3.10  Camera initialisation ───────────────────────────────────────────────
async function startCamera() {
  try {
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:STATE.facingMode},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    videoEl.srcObject=stream; STATE.camStream=stream;
    await new Promise((res,rej)=>{videoEl.onloadedmetadata=res;videoEl.onerror=()=>rej(new Error('meta'));});
    await videoEl.play();
    STATE.videoW=videoEl.videoWidth||1280; STATE.videoH=videoEl.videoHeight||720;
    setupSourceDownsample(STATE.videoW, STATE.videoH);
    if (SRC.active){ STATE.videoW=SRC.w; STATE.videoH=SRC.h; }
    return _finaliseCamera();
  } catch(err) {
    let msg='Camera error: '+err.message;
    if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError')
      msg='Camera access denied. Allow permission and reload.';
    else if(err.name==='NotFoundError')      msg='No camera found on this device.';
    else if(err.name==='NotReadableError')   msg='Camera in use by another app.';
    else if(err.name==='OverconstrainedError') return _startCameraFallback();
    showError(msg); return false;
  }
}
async function _startCameraFallback() {
  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    videoEl.srcObject=stream; STATE.camStream=stream;
    await new Promise(res=>{videoEl.onloadedmetadata=res;});
    await videoEl.play();
    STATE.videoW=videoEl.videoWidth||640; STATE.videoH=videoEl.videoHeight||480;
    return _finaliseCamera();
  } catch(e) { showError('Cannot access any camera: '+e.message); return false; }
}
function _finaliseCamera() {
  const _rs=renderSize(window.innerWidth,window.innerHeight);
  const cW=_rs.w, cH=_rs.h;
  compositeCanvas.width=cW; compositeCanvas.height=cH;
  let pW=240, pH=Math.round(pW*cH/cW);
  if (pW*pH>150000){const s=Math.sqrt(150000/(pW*pH));pW=(pW*s)|0;pH=(pH*s)|0;}
  workCanvas.width=pW; workCanvas.height=pH;
  initBuffers(pW,pH);
  updateCrop(STATE.videoW,STATE.videoH,cW,cH);
  STATE.fpsT=performance.now(); STATE.cameraOk=true;
  initAudio();   // start audio engine after camera stream is live
  const hint=document.getElementById('touch-hint');
  hint.classList.add('show');
  setTimeout(()=>{hint.style.opacity='0';setTimeout(()=>{hint.style.display='none';},400);},3500);
  return true;
}

// ── 3.11  Recording — iOS-aware MIME, clean canvas output ────────────────────
const _isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
  (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

const _mimeTypeCandidates=_isIOS
  ? ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm']
  : ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4;codecs=avc1','video/mp4'];

let _dlAutoHide = 0;   // clearTimeout handle for download-toast auto-dismiss

// ─────────────────────────────────────────────────────────────────────────────
// VIDEO UPLOAD + PROCESS
// Loads a user video into videoEl, runs the SAME tracking/effect pipeline for a
// live preview, then offers "process & save": plays the clip start→finish while
// MediaRecorder captures the composite canvas (with the active style baked in),
// fixes the WebM duration, and hands back a download.
// ─────────────────────────────────────────────────────────────────────────────

function startUploadedVideo(file) {
  const url = URL.createObjectURL(file);
  // Point the existing pipeline video element at the uploaded file
  videoEl.srcObject = null;
  videoEl.src = url;
  videoEl.loop = true;            // preview loops; processing temporarily disables
  videoEl.muted = true;           // keep muted so our synth audio is the soundtrack
  videoEl.playsInline = true;

  const onReady = () => {
    videoEl.removeEventListener('loadedmetadata', onReady);
    STATE.videoW = videoEl.videoWidth  || 1280;
    STATE.videoH = videoEl.videoHeight || 720;
    setupSourceDownsample(STATE.videoW, STATE.videoH);   // handle 4K uploads
    // After downsample the working source dims change → crop against those
    if (SRC.active){ STATE.videoW=SRC.w; STATE.videoH=SRC.h; }
    STATE.uploadMode = true;

    // Mirror _finaliseCamera setup
    const _rs=renderSize(window.innerWidth,window.innerHeight);
    const cW=_rs.w, cH=_rs.h;
    compositeCanvas.width=cW; compositeCanvas.height=cH;
    let pW=240, pH=Math.round(pW*cH/cW);
    if (pW*pH>150000){const s=Math.sqrt(150000/(pW*pH));pW=(pW*s)|0;pH=(pH*s)|0;}
    workCanvas.width=pW; workCanvas.height=pH;
    initBuffers(pW,pH);
    updateCrop(STATE.videoW,STATE.videoH,cW,cH);
    STATE.warmup=0; STATE.fpsT=performance.now(); STATE.cameraOk=true;
    initAudio();

    videoEl.play().catch(()=>{});
    // Hide splash
    const splash=document.getElementById('splash');
    splash.style.opacity='0'; splash.style.transition='opacity .4s ease';
    setTimeout(()=>{splash.style.display='none'; if(window._splashAnimStop)window._splashAnimStop();},400);
    // Swap the PHOTO/record cluster meaning: in upload mode the record button
    // triggers a full-clip render+save instead of free recording.
    document.getElementById('btn-record').setAttribute('data-upload','1');
    const bk=document.getElementById('btn-back'); if(bk) bk.style.display='flex';
    const fl=document.getElementById('btn-flip'); if(fl) fl.style.display='none';
    STATE.lastDetectT=performance.now();
    if(!rafId) rafId=requestAnimationFrame(loop);
    showError('Video loaded — tap the video button to render & save with this effect.');
  };
  videoEl.addEventListener('loadedmetadata', onReady);
  videoEl.addEventListener('error', ()=>{
    showError('Could not load that video file.');
  }, {once:true});
}

// Load a still image into the pipeline (applies live effects over a fixed frame).
function startUploadedImage(file){
  const url=URL.createObjectURL(file);
  const im=new Image();
  im.onload=()=>{
    if(!STILL.canvas){ STILL.canvas=document.createElement('canvas'); STILL.ctx=STILL.canvas.getContext('2d'); }
    // Downscale very large photos for performance
    let w=im.naturalWidth, h=im.naturalHeight;
    const longest=Math.max(w,h);
    if(longest>1280){ const s=1280/longest; w=Math.round(w*s); h=Math.round(h*s); }
    STILL.canvas.width=w; STILL.canvas.height=h; STILL.w=w; STILL.h=h;
    STILL.ctx.drawImage(im,0,0,w,h);
    STILL.active=true;
    URL.revokeObjectURL(url);

    STATE.videoW=w; STATE.videoH=h;
    STATE.uploadMode=true;   // record button → re-export the styled still as PNG? keep photo flow
    SRC.active=false;

    const _rs=renderSize(window.innerWidth,window.innerHeight);
    const cW=_rs.w, cH=_rs.h;
    compositeCanvas.width=cW; compositeCanvas.height=cH;
    let pW=240, pH=Math.round(pW*cH/cW);
    if (pW*pH>150000){const s=Math.sqrt(150000/(pW*pH));pW=(pW*s)|0;pH=(pH*s)|0;}
    workCanvas.width=pW; workCanvas.height=pH;
    initBuffers(pW,pH);
    updateCrop(STATE.videoW,STATE.videoH,cW,cH);
    STATE.warmup=0; STATE.fpsT=performance.now(); STATE.cameraOk=true;
    initAudio();

    const splash=document.getElementById('splash');
    splash.style.opacity='0'; splash.style.transition='opacity .4s ease';
    setTimeout(()=>{splash.style.display='none'; if(window._splashAnimStop)window._splashAnimStop();},400);
    const bk=document.getElementById('btn-back'); if(bk) bk.style.display='flex';
    const fl=document.getElementById('btn-flip'); if(fl) fl.style.display='none';
    // In photo mode the record button is irrelevant; PHOTO button saves the styled frame.
    document.getElementById('btn-record').removeAttribute('data-upload');
    STATE.lastDetectT=performance.now();
    if(!rafId) rafId=requestAnimationFrame(loop);
    showError('Photo loaded — pick a style, then tap PHOTO to save the result.');
  };
  im.onerror=()=>{ showError('Could not load that image.'); URL.revokeObjectURL(url); };
  im.src=url;
}

// Full-clip render: rewind, record one complete pass, fix duration, download.
async function renderUploadedClip() {
  if (!STATE.uploadMode || STATE.isRecording) return;
  if (typeof compositeCanvas.captureStream !== 'function') {
    showError('Canvas capture not supported in this browser.'); return;
  }
  STATE.uploadCancelled = false;
  const prog = document.getElementById('upload-progress');
  const bar  = document.getElementById('up-bar');
  const pct  = document.getElementById('up-pct');
  prog.classList.add('show');

  // Pick MIME (reuse global candidate list)
  let mimeType='';
  if (typeof MediaRecorder!=='undefined') {
    for (const mt of _mimeTypeCandidates) if(MediaRecorder.isTypeSupported(mt)){mimeType=mt;break;}
  }

  // Build combined stream: canvas video + synth audio
  const videoStream = compositeCanvas.captureStream(24);
  let stream = videoStream;
  if (AUDIO.ready && AUDIO.streamDest) {
    try {
      stream = new MediaStream([
        ...videoStream.getVideoTracks(),
        ...AUDIO.streamDest.stream.getAudioTracks()
      ]);
    } catch(_) { stream = videoStream; }
  }

  const opts = mimeType ? { mimeType, videoBitsPerSecond:6_000_000 } : {};
  const rec  = new MediaRecorder(stream, opts);
  const chunks = [];
  rec.ondataavailable = e => { if(e.data&&e.data.size>0) chunks.push(e.data); };

  // Disable loop, rewind to start, play once through
  const wasLoop = videoEl.loop;
  videoEl.loop = false;
  videoEl.pause();
  videoEl.currentTime = 0;
  await new Promise(r => { const h=()=>{videoEl.removeEventListener('seeked',h);r();}; videoEl.addEventListener('seeked',h); });

  const startT = performance.now();
  STATE.isRecording = true;       // suppresses HUD/labels during capture
  rec.start(100);
  await videoEl.play().catch(()=>{});

  const dur = videoEl.duration || 0;
  // Progress updater
  const progTimer = setInterval(()=>{
    if (dur>0){
      const p = Math.min(100, (videoEl.currentTime/dur)*100)|0;
      bar.style.width = p+'%'; pct.textContent = p+'%';
    }
  }, 100);

  // Finish handler
  const finish = async () => {
    clearInterval(progTimer);
    STATE.isRecording = false;
    try { rec.stop(); } catch(_){}
  };
  videoEl.addEventListener('ended', finish, {once:true});

  // Cancel handler
  const cancelBtn = document.getElementById('up-cancel');
  const onCancel = () => { STATE.uploadCancelled = true; finish(); };
  cancelBtn.addEventListener('click', onCancel, {once:true});

  rec.onstop = async () => {
    cancelBtn.removeEventListener('click', onCancel);
    prog.classList.remove('show');
    bar.style.width='0%'; pct.textContent='0%';
    STATE.isRecording = false;
    // Restore looping preview: rewind to start and force playback so it doesn't
    // sit frozen on the last frame.
    videoEl.loop = true;
    try { videoEl.currentTime = 0; } catch(_){}
    const _resume = ()=>{ videoEl.play().catch(()=>{}); };
    _resume();
    setTimeout(_resume, 60);   // second nudge in case the first is ignored
    if (STATE.uploadCancelled) { return; }
    let eff = mimeType || 'video/webm';
    let blob = new Blob(chunks, {type:eff});
    const durMs = performance.now() - startT;
    if (eff.includes('webm')) { try { blob = await fixWebmDuration(blob, durMs); } catch(_){} }
    const ext = eff.includes('mp4')?'mp4':'webm';
    saveBlob(blob, 'raster_styled_'+Date.now()+'.'+ext);
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// WEBM DURATION FIX
// Chrome's MediaRecorder writes WebM files with no Segment duration, so players
// report an infinite / absurd length. This injects the real duration (ms) into
// the EBML Info→Duration field. Compact parser — only touches what it needs.
// Based on the well-known ts-ebml duration-fix technique, reimplemented inline.
// ─────────────────────────────────────────────────────────────────────────────
function fixWebmDuration(blob, durationMs) {
  return new Promise((resolve) => {
    try {
      const reader = new FileReader();
      reader.onloadend = () => {
        try {
          const buf = new Uint8Array(reader.result);
          const out = _injectWebmDuration(buf, durationMs);
          resolve(out ? new Blob([out], { type: blob.type }) : blob);
        } catch(e) { resolve(blob); }   // any failure → return original
      };
      reader.onerror = () => resolve(blob);
      reader.readAsArrayBuffer(blob);
    } catch(e) { resolve(blob); }
  });
}

// Minimal EBML walker: find Segment(0x18538067) → Info(0x1549A966) →
// existing Duration(0x4489) or inject one. Returns new Uint8Array or null.
function _injectWebmDuration(buf, durationMs) {
  // Helper: read variable-length EBML id/size at offset
  function readVInt(arr, pos) {
    const first = arr[pos];
    if (first === undefined) return null;
    let len = 1, mask = 0x80;
    while (len <= 8 && !(first & mask)) { mask >>= 1; len++; }
    if (len > 8) return null;
    let val = first & (mask - 1);
    for (let i = 1; i < len; i++) val = val * 256 + arr[pos + i];
    return { value: val, length: len };
  }
  function readId(arr, pos) {
    const first = arr[pos];
    if (first === undefined) return null;
    let len = 1, mask = 0x80;
    while (len <= 4 && !(first & mask)) { mask >>= 1; len++; }
    if (len > 4) return null;
    let id = 0;
    for (let i = 0; i < len; i++) id = id * 256 + arr[pos + i];
    return { id, length: len };
  }

  let pos = 0;
  // Top level: find Segment
  while (pos < buf.length) {
    const idR = readId(buf, pos); if (!idR) break;
    const szR = readVInt(buf, pos + idR.length); if (!szR) break;
    const headerLen = idR.length + szR.length;
    if (idR.id === 0x18538067) {           // Segment
      const segStart = pos + headerLen;
      // Walk inside Segment to find Info
      let p = segStart;
      const segEnd = (szR.value === Math.pow(2, 7*szR.length)-1)
        ? buf.length : segStart + szR.value;
      while (p < segEnd && p < buf.length) {
        const cid = readId(buf, p); if (!cid) break;
        const csz = readVInt(buf, p + cid.length); if (!csz) break;
        const chL = cid.length + csz.length;
        if (cid.id === 0x1549A966) {        // Info
          const infoStart = p + chL;
          const infoEnd = infoStart + csz.value;
          // Look for existing Duration (0x4489) inside Info
          let q = infoStart;
          while (q < infoEnd && q < buf.length) {
            const did = readId(buf, q); if (!did) break;
            const dsz = readVInt(buf, q + did.length); if (!dsz) break;
            const dhL = did.length + dsz.length;
            if (did.id === 0x4489) {        // Duration already present → patch it
              // Write durationMs as 8-byte float64 (WebM duration is in TimecodeScale units;
              // default scale 1e6 ns = 1ms, so duration value = ms)
              const dv = new DataView(buf.buffer, buf.byteOffset + q + dhL, dsz.value >= 8 ? 8 : 4);
              if (dsz.value >= 8) dv.setFloat64(0, durationMs);
              else dv.setFloat32(0, durationMs);
              return buf;  // patched in place
            }
            q += dhL + dsz.value;
          }
          // No Duration element → inject one (id 0x4489 + size 0x88 + 8-byte f64)
          const dur = new Uint8Array(11);
          dur[0] = 0x44; dur[1] = 0x89; dur[2] = 0x88;  // id + size(8)
          new DataView(dur.buffer).setFloat64(3, durationMs);
          // Build new buffer: insert dur at infoStart, and grow Info size field
          // Simplest robust approach: insert and rewrite Info size as 8-byte vint
          const before = buf.subarray(0, p);                 // up to Info id
          const infoBody = buf.subarray(infoStart, infoEnd);
          const after = buf.subarray(infoEnd);
          // New Info size = old body + dur length, as 8-byte vint (0x01 + 7 bytes)
          const newInfoLen = infoBody.length + dur.length;
          const newSize = new Uint8Array(8);
          newSize[0] = 0x01;
          let v = newInfoLen;
          for (let i = 7; i >= 1; i--) { newSize[i] = v & 0xFF; v = Math.floor(v/256); }
          const infoId = buf.subarray(p, p + cid.length);
          const out = new Uint8Array(before.length - 0 + 0); // placeholder
          // Concatenate: before(up to & incl Info id) + newSize + dur + infoBody + after
          const head = buf.subarray(0, p + cid.length);
          const total = head.length + newSize.length + dur.length + infoBody.length + after.length;
          const res = new Uint8Array(total);
          let o = 0;
          res.set(head, o); o += head.length;
          res.set(newSize, o); o += newSize.length;
          res.set(dur, o); o += dur.length;
          res.set(infoBody, o); o += infoBody.length;
          res.set(after, o);
          return res;
        }
        p += chL + csz.value;
      }
    }
    pos += headerLen + szR.value;
  }
  return null;  // couldn't find structure → caller keeps original blob
}

function startRecording() {
  if (STATE.isRecording) return;
  if (typeof compositeCanvas.captureStream !== 'function') {
    showError('Canvas capture not supported on this browser.'); return;
  }
  let mimeType='';
  if (typeof MediaRecorder!=='undefined') {
    for (const mt of _mimeTypeCandidates) if(MediaRecorder.isTypeSupported(mt)){mimeType=mt;break;}
  }
  try {
    const videoStream=compositeCanvas.captureStream(24);
    // Mix video + synthesized audio into a single combined stream.
    // If audio is unavailable (initAudio failed or inactive), record video-only.
    let combinedStream = videoStream;
    if (AUDIO.ready && AUDIO.streamDest) {
      try {
        combinedStream = new MediaStream([
          ...videoStream.getVideoTracks(),
          ...AUDIO.streamDest.stream.getAudioTracks()
        ]);
      } catch(_) { combinedStream = videoStream; /* audio mix failed, video only */ }
    }
    const stream=combinedStream;
    // Select MIME type that supports audio where possible
    const audioMimes = _isIOS
      ? ['video/mp4;codecs=avc1','video/mp4']
      : ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm;codecs=vp9','video/webm','video/mp4'];
    if (AUDIO.ready) {
      mimeType='';
      for(const mt of audioMimes){if(MediaRecorder.isTypeSupported(mt)){mimeType=mt;break;}}
    }
    const opts=mimeType?{mimeType,videoBitsPerSecond:4_000_000}:{};
    STATE.mediaRecorder=new MediaRecorder(stream,opts);
    STATE.chunks=[];
    STATE.mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)STATE.chunks.push(e.data);};
    STATE.mediaRecorder.onstop=async ()=>{
      const eff=mimeType||'video/webm';
      let blob=new Blob(STATE.chunks,{type:eff});
      const durMs = performance.now() - STATE.recordStartT;
      // Fix the infinite-duration bug for WebM (Chrome muxer omits duration)
      if (eff.includes('webm')) {
        try { blob = await fixWebmDuration(blob, durMs); } catch(_) {}
      }
      const ext=eff.includes('mp4')?'mp4':'webm';
      saveBlob(blob, 'raster_'+Date.now()+'.'+ext);
    };
    STATE.mediaRecorder.onerror=e=>{showError('Recording error: '+(e.error?e.error.message:'unknown'));stopRecording();};
    STATE.mediaRecorder.start(100);
    STATE.isRecording=true; STATE.recordStartT=performance.now();
    document.getElementById('btn-record').textContent='\u23F9';
    document.getElementById('btn-record').classList.add('recording');
  } catch(err){showError('Could not start recording: '+err.message);}
}

function stopRecording() {
  if(!STATE.isRecording||!STATE.mediaRecorder) return;
  try{STATE.mediaRecorder.stop();}catch(_){}
  STATE.isRecording=false; STATE.mediaRecorder=null;
  document.getElementById('btn-record').textContent='\u23FA';
  document.getElementById('btn-record').classList.remove('recording');
}

// ── 3.12  Error display ───────────────────────────────────────────────────────

// ── Flip between back and front camera (live mode only) ──────────────────────
async function flipCamera(){
  if (STATE.uploadMode || !STATE.cameraOk) return;   // only in live mode
  STATE.facingMode = (STATE.facingMode==='environment') ? 'user' : 'environment';
  // Stop the current stream before requesting the other camera
  if (STATE.camStream){
    STATE.camStream.getTracks().forEach(t=>{ try{t.stop();}catch(e){} });
    STATE.camStream=null;
  }
  const ok = await startCamera();
  if (!ok){
    // revert on failure
    STATE.facingMode = (STATE.facingMode==='environment') ? 'user' : 'environment';
    showError('Could not switch camera.');
    return;
  }
  // Mirror the view for the front camera (natural selfie feel). Touch coords are
  // unaffected because the mirror is a display-only CSS transform; tracking still
  // runs on the un-mirrored pixels, which stays consistent for the user.
  compositeCanvas.classList.toggle('mirrored', STATE.facingMode==='user');
}

// ── Return to home: stop current mode, free resources, allow switching modes ──
function returnToHome() {
  // Stop any recording in flight
  if (STATE.isRecording && STATE.mediaRecorder) {
    try { STATE.mediaRecorder.stop(); } catch(e){}
  }
  STATE.isRecording = false;
  // Stop the render/preview loop
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  // Tear down live camera stream
  if (STATE.camStream) {
    STATE.camStream.getTracks().forEach(t=>{ try{t.stop();}catch(e){} });
    STATE.camStream = null;
  }
  // Tear down uploaded video
  if (STATE.uploadMode) {
    try { videoEl.pause(); } catch(e){}
    if (videoEl.src) { try { URL.revokeObjectURL(videoEl.src); } catch(e){} videoEl.removeAttribute('src'); videoEl.load(); }
  }
  videoEl.srcObject = null;
  STATE.uploadMode = false;
  STATE.cameraOk = false;
  STATE.uploadCancelled = false;
  SRC.active = false;
  STILL.active = false;
  STATE.facingMode = 'environment';
  if (compositeCanvas) compositeCanvas.classList.remove('mirrored');
  ZOOM.factor = 1;
  _crop.valid = false;
  // Lower audio so the home is quiet
  if (AUDIO.ready) AUDIO.masterGain.gain.setTargetAtTime(0.0, AUDIO.ctx.currentTime, 0.2);
  // Hide any upload progress
  const prog=document.getElementById('upload-progress'); if(prog) prog.classList.remove('show');
  // Hide back arrow, show splash + restart its animation
  const bk=document.getElementById('btn-back'); if(bk) bk.style.display='none';
  const fl=document.getElementById('btn-flip'); if(fl) fl.style.display='none';
  const splash=document.getElementById('splash');
  splash.style.display='flex'; splash.style.opacity='1'; splash.style.transition='none';
  if (window._splashAnimStart) window._splashAnimStart();
}

// ── Seamless save ────────────────────────────────────────────────────────────
// If the user granted a folder once (from the home screen), every file writes
// straight into it with NO further prompts. Otherwise: showSaveFilePicker (one
// prompt) or, as a last resort, a direct anchor download.
async function saveBlob(blob, filename) {
  const type = blob.type || (filename.endsWith('.png') ? 'image/png' : 'video/webm');

  // 1) Web Share with files — best on iPhone: native sheet → "Save Image"/"Save
  //    Video" in a single tap, no download verification. Must be in a user
  //    gesture; photo capture and record-stop both qualify.
  try {
    const file = new File([blob], filename, { type });
    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      await navigator.share({ files:[file] });
      flashSaved('SAVED');
      return;
    }
  } catch(e) {
    if (e && e.name === 'AbortError') return;   // user closed the share sheet
    // otherwise fall through to other methods
  }

  // 2) File System Access picker (Chrome/Edge desktop, Android).
  if (window.showSaveFilePicker) {
    try {
      const ext = filename.split('.').pop();
      const types = ext === 'png'
        ? [{ description:'Image', accept:{'image/png':['.png']} }]
        : [{ description:'Video', accept:{[type]:['.'+ext]} }];
      const handle = await window.showSaveFilePicker({ suggestedName: filename, types });
      const w = await handle.createWritable();
      await w.write(blob); await w.close();
      flashSaved('SAVED');
      return;
    } catch(e) {
      if (e && e.name === 'AbortError') return;
    }
  }

  // 3) Last resort: direct anchor download.
  try {
    const url = URL.createObjectURL(blob);
    if (STATE.lastDlUrl) URL.revokeObjectURL(STATE.lastDlUrl);
    STATE.lastDlUrl = url;
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    flashSaved('SAVED');
  } catch(e) {
    showError('Could not save file: ' + e.message);
  }
}

// Brief confirmation toast (auto-hides). No manual action required.
function flashSaved(label) {
  const toast = document.getElementById('download-toast');
  if (toast) {
    toast.classList.add('show');
    clearTimeout(_dlAutoHide);
    _dlAutoHide = setTimeout(()=>{ toast.classList.remove('show'); }, 3500);
  }
}

function showError(msg) {
  const el=document.getElementById('error-banner');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>{el.style.display='none';},9000);
}

// ═══════════════════════════════════════════════════════════════════════════
// PHASE 4 — DOM EVENT LISTENERS & HARDWARE LIFECYCLE HOOKS
// ═══════════════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {

  compositeCanvas=document.getElementById('composite');
  compositeCtx=compositeCanvas.getContext('2d',{willReadFrequently:false,alpha:false});

  workCanvas=document.createElement('canvas');
  workCtx=workCanvas.getContext('2d',{willReadFrequently:true});

  // Effect canvas for pixel-pass styles (created early so initBuffers can
  // allocate _dstImgData via _effectCtx.createImageData)
  _effectCanvas=document.createElement('canvas');
  _effectCtx=_effectCanvas.getContext('2d',{willReadFrequently:true});

  videoEl=document.getElementById('cam');

  // ── Animated splash background: SPACE & ALGORITHMS dot-matrix grid ──────────
  // A grid of symbols (circles, squares, glyphs) in lime + electric blue on near
  // -black. Cells pulse/drift via a flowing noise field, forming shifting clusters
  // like the residency poster. Pure canvas, GC-light (no per-cell allocation).
  (function(){
    const cvs=document.getElementById('splash-bg');
    if(!cvs) return;
    const sctx=cvs.getContext('2d');
    const ACCENT='#c8f01e';   // single accent; rest is monochrome
    const SYMS=['\u25CB','\u25A1','\u25C7','+','\u00B7','\u25AB','\u25E6'];  // ○ □ ◇ + · ▫ ◦
    let raf=null, t0=performance.now();
    let cols=0, rows=0; const cell=20;

    function resize(){
      cvs.width=window.innerWidth; cvs.height=window.innerHeight;
      cols=Math.ceil(cvs.width/cell)+1;
      rows=Math.ceil(cvs.height/cell)+1;
    }
    resize();
    window.addEventListener('resize',resize);

    // Flowing field value at (cx,cy,t) → drives whether a cell is lit + its colour.
    function field(cx, cy, t){
      return Math.sin(cx*0.28 + t*0.7)
           + Math.sin(cy*0.32 - t*0.5)
           + Math.sin((cx+cy)*0.20 + t*0.9)
           + Math.sin(Math.sqrt(cx*cx+cy*cy)*0.30 - t*0.6);
    }

    function frame(now){
      const t=(now-t0)/1000;
      const w=cvs.width, h=cvs.height;
      sctx.fillStyle='#0a0a0a'; sctx.fillRect(0,0,w,h);
      sctx.textBaseline='middle'; sctx.textAlign='center';
      // global slow drift of the whole field
      const dx=Math.sin(t*0.15)*3, dy=t*0.4;
      for (let r=0;r<rows;r++){
        for (let c=0;c<cols;c++){
          const v=field(c+dx, r+dy, t);     // ~ -4..4
          if (v < 0.6) continue;            // sparse — only lit cells drawn
          const lit=(v-0.6)/3.4;            // 0..1 intensity
          const x=c*cell+cell*0.5, y=r*cell+cell*0.5;
          // mono field with sparse accent hits (only the brightest cells)
          const isAccent = v > 2.6;
          sctx.globalAlpha=0.14+lit*0.6;
          sctx.fillStyle=isAccent?ACCENT:'#ffffff';
          const sym=SYMS[((c*3+r*5+(t*2|0))%SYMS.length+SYMS.length)%SYMS.length];
          sctx.font='700 '+(11+lit*6|0)+'px Helvetica,Arial,sans-serif';
          sctx.fillText(sym, x, y);
        }
      }
      sctx.globalAlpha=1;
      raf=requestAnimationFrame(frame);
    }
    window._splashAnimStart=()=>{ if(!raf){ t0=performance.now(); raf=requestAnimationFrame(frame);} };
    window._splashAnimStop =()=>{ if(raf){ cancelAnimationFrame(raf); raf=null; } };
    window._splashAnimStart();
  })();


  // ── Splash — 6-style grid ──────────────────────────────────────────────

  // ── Contextual TUNE panel: per-effect parameters ──────────────────────────
  // Spec format: [cfgKey, label, min, max, step, isSelect?, options?]
  const TUNE_SPECS = {
    B: [],  // ORBIT — no extra params
    A: [],  // SCAN  — no extra params
    C: [],  // GHOST — no extra params
    D: [
      ['neuralCurve','Curvature',0,60,1],
    ],
    F: [
      ['sortThresh','Sort Threshold',0,90,1],
      ['sortSeg','Segment Length',8,120,1],
    ],
    H: [
      ['grainScale','Grain Size',1,8,1],
      ['grainPalette','Palette',0,4,1,true,['Lime','Amber','Mono','Cyan','RGB']],
      ['grainDensity','Density',20,100,1],
      ['grainSpeed','Anim Speed',0,200,1],
      ['grainScan','Scanlines',0,100,1],
      ['grainFlicker','Flicker',0,100,1],
    ],
    I: [
      ['evapThresh','Depth Split',0,100,1],
      ['evapDot','Dot Size',40,200,1],
      ['evapPalette','Palette',0,2,1,true,['Lime/Red','Cyan/Mag','White/Org']],
    ],
    J: [
      ['asciiMode','Mode',0,1,1,true,['Grid','Mono']],
      ['asciiCell','Cell Size',5,16,1],
      ['asciiBg','Background',0,3,1,true,['Blue','Black','White','Red']],
      ['asciiAccent','Red Accents',0,100,1],
      ['amonoThresh','Mono Gate',0,100,1],
    ],
    L: [
      ['mosaicCols','Grid Columns',4,16,1],
      ['mosaicChunk','Block Chunk',2,12,1],
    ],
    M: [
      ['contSpread','Spread Speed',5,60,1],
      ['contSeeds','Random Seeds',0,8,1],
      ['contReset','Reset Interval',2,15,1],
    ],
    P: [
      ['thermalPalette','Palette',0,4,1,true,['Iron','Jet','Arctic','Night','X-Ray']],
      ['thermalSmooth','Render',0,1,1,true,['Blocky','Smooth']],
    ],
    Q: [
      ['waveLen','Wavelength',18,120,1],
      ['waveSpeed','Wave Speed',5,100,1],
      ['waveAmp','Depth',2,60,1],
    ],
  };

  function buildTunePanel(style) {
    const head = document.getElementById('tune-head');
    if (head) head.textContent = STYLE_NAMES[style] || '';
    const host = document.getElementById('tune-dynamic');
    if (!host) return;
    host.innerHTML = '';
    const specs = TUNE_SPECS[style] || [];
    if (specs.length > 0) {
      const sect = document.createElement('div');
      sect.className = 'tune-sect';
      sect.textContent = (STYLE_NAMES[style]||'') + ' PARAMETERS';
      host.appendChild(sect);
    }

    specs.forEach(spec => {
      const [key, label, min, max, step, isSelect, options] = spec;
      const row = document.createElement('div');
      row.className = 'ctrl-row';

      if (isSelect) {
        // Render as a segmented toggle group
        const lab = document.createElement('div');
        lab.className = 'ctrl-label';
        lab.textContent = label;
        row.appendChild(lab);
        const grp = document.createElement('div');
        grp.className = 'toggle-row';
        options.forEach((opt, oi) => {
          const b = document.createElement('button');
          b.className = 'toggle-btn' + (CFG[key]===oi ? ' on' : '');
          b.textContent = opt;
          b.style.fontSize = '.5rem';
          b.addEventListener('click', () => {
            CFG[key] = oi;
            grp.querySelectorAll('.toggle-btn').forEach((x,xi)=>x.classList.toggle('on',xi===oi));
            applyPaletteTheme(key, oi);   // palette choice re-tints the interface
          });
          grp.appendChild(b);
        });
        row.appendChild(grp);
      } else {
        const lab = document.createElement('div');
        lab.className = 'ctrl-label';
        const valSpan = document.createElement('span');
        valSpan.textContent = CFG[key];
        lab.textContent = label + ' ';
        lab.appendChild(valSpan);
        row.appendChild(lab);
        const inp = document.createElement('input');
        inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step;
        inp.value = CFG[key];
        inp.addEventListener('input', function(){
          CFG[key] = parseInt(this.value, 10);
          valSpan.textContent = this.value;
        });
        row.appendChild(inp);
      }
      host.appendChild(row);
    });

    // ── MIX section: any style can be layered UNDER the active one, except a
    //    tracker cannot be mixed with another tracker. The mix always renders
    //    beneath the active effect.
    const kind = STYLE_KIND[style];
    const mixSect = document.createElement('div');
    mixSect.className = 'tune-sect';
    mixSect.textContent = '/ MIX — LAYER UNDER';
    host.appendChild(mixSect);
    const mixRow = document.createElement('div');
    mixRow.className = 'ctrl-row';
    const mixGrp = document.createElement('div');
    mixGrp.className = 'toggle-row';
    mixGrp.style.flexWrap = 'wrap';
    Object.keys(MIX_ALL).forEach(k => {
      if (k === style) return;                                   // not itself
      if (k && kind==='tracker' && STYLE_KIND[k]==='tracker') return; // no tracker+tracker
      const b = document.createElement('button');
      b.className = 'toggle-btn' + (CFG.mixStyle===k ? ' on' : '');
      b.textContent = MIX_ALL[k];
      b.style.fontSize = '.5rem';
      b.style.flex = '1 1 30%';
      b.addEventListener('click', () => {
        CFG.mixStyle = k;
        mixGrp.querySelectorAll('.toggle-btn').forEach(x=>x.classList.toggle('on', x===b));
      });
      mixGrp.appendChild(b);
    });
    mixRow.appendChild(mixGrp);
    host.appendChild(mixRow);
  }

  // Set the active style: update label, re-tint the interface, rebuild the
  // contextual TUNE panel. (Style is chosen via the cycle button now.)
  function setSplashStyle(s) {
    CFG.style=s;
    // Drop a mix selection that is no longer cross-category for the new style
    if (CFG.mixStyle && (CFG.mixStyle===s ||
        (STYLE_KIND[s]==='tracker' && STYLE_KIND[CFG.mixStyle]==='tracker'))) CFG.mixStyle='';
    const bs=document.getElementById('btn-style');
    if(bs) bs.innerHTML=STYLE_NAMES[s];
    buildTunePanel(s);   // rebuild contextual params (theme persists, unchanged)
  }
  // (Splash style buttons removed — style is chosen via the STYLE cycle button + TUNE)
  buildTunePanel(CFG.style);   // build params for the default style on load

  // ── Splash ↔ live settings sliders (bidirectional sync) ────────────────
  // Panel sliders are now standalone (splash no longer carries duplicates)
  function bindSlider(lId, lValId, setter) {
    const lR=document.getElementById(lId), lV=document.getElementById(lValId);
    if(!lR||!lV) return;
    lR.addEventListener('input',function(){setter(parseInt(this.value,10));lV.textContent=this.value;});
  }
  bindSlider('lr-mot','lv-mot',v=>{CFG.motionThresh=v;});
  bindSlider('lr-bri','lv-bri',v=>{CFG.brightThresh=v;});
  bindSlider('lr-min','lv-min',v=>{CFG.minArea=v;});

  // ── Touch-bias pointer events on composite canvas ──────────────────────
  let _settingsOpen=false;
  // Pointer tracking: 1 pointer = tap-to-focus, 2 pointers = pinch-to-zoom.
  const _ptrs = new Map();           // pointerId → {x,y}
  let _pinchStartDist = 0, _pinchStartZoom = 1;
  function _twoPointerDist(){
    const p=[..._ptrs.values()];
    if(p.length<2) return 0;
    const dx=p[0].x-p[1].x, dy=p[0].y-p[1].y;
    return Math.sqrt(dx*dx+dy*dy);
  }
  compositeCanvas.addEventListener('pointerdown',e=>{
    if(_settingsOpen||!STATE.cameraOk) return;
    e.preventDefault();
    _ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    compositeCanvas.setPointerCapture(e.pointerId);
    if(_ptrs.size===2){
      // Enter pinch mode: cancel focus, capture baseline distance + zoom
      TOUCH.active=false;
      _pinchStartDist=_twoPointerDist();
      _pinchStartZoom=ZOOM.factor;
    } else if(_ptrs.size===1){
      TOUCH.x=e.clientX; TOUCH.y=e.clientY; TOUCH.active=true; TOUCH.lastT=performance.now();
    }
  },{passive:false});
  compositeCanvas.addEventListener('pointermove',e=>{
    if(_settingsOpen) return;
    e.preventDefault();
    if(_ptrs.has(e.pointerId)) _ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(_ptrs.size>=2 && _pinchStartDist>0){
      // Pinch → adjust digital zoom
      const d=_twoPointerDist();
      let z=_pinchStartZoom*(d/_pinchStartDist);
      z=Math.max(ZOOM.min,Math.min(ZOOM.max,z));
      ZOOM.factor=z;
      ZOOM.lastShown=performance.now();
      updateCrop(STATE.videoW,STATE.videoH,compositeCanvas.width,compositeCanvas.height);
    } else if(TOUCH.active && e.buttons!==0){
      TOUCH.x=e.clientX; TOUCH.y=e.clientY; TOUCH.lastT=performance.now();
    }
  },{passive:false});
  function _ptrEnd(e){
    e.preventDefault();
    _ptrs.delete(e.pointerId);
    if(_ptrs.size<2) _pinchStartDist=0;       // exit pinch
    if(_ptrs.size===0) TOUCH.lastT=performance.now()-TOUCH.timeout+500;
  }
  compositeCanvas.addEventListener('pointerup',_ptrEnd,{passive:false});
  compositeCanvas.addEventListener('pointercancel',_ptrEnd,{passive:false});

  // ── Style cycle button (A→B→C→D→E→F→A) ────────────────────────────────
  document.getElementById('btn-style').addEventListener('click',()=>{
    const i=STYLE_CYCLE.indexOf(CFG.style);
    setSplashStyle(STYLE_CYCLE[(i+1)%STYLE_CYCLE.length]);
  });

  // ── Record / stop ──────────────────────────────────────────────────────
  document.getElementById('btn-record').addEventListener('click',()=>{
    if(!STATE.cameraOk){showError('Not ready yet.');return;}
    if(STATE.uploadMode){
      renderUploadedClip();   // upload mode → render the whole clip with effect
    } else {
      STATE.isRecording?stopRecording():startRecording();
    }
  });

  // ── Settings panel ─────────────────────────────────────────────────────
  document.getElementById('btn-settings').addEventListener('click',()=>{
    _settingsOpen=!_settingsOpen;
    document.getElementById('settings-panel').classList.toggle('open',_settingsOpen);
    document.getElementById('btn-settings').classList.toggle('active',_settingsOpen);
    if(_settingsOpen) TOUCH.active=false;
  });
  document.getElementById('btn-vig').addEventListener('click',function(){
    CFG.showVignette=!CFG.showVignette;this.classList.toggle('on',CFG.showVignette);
  });
  document.getElementById('btn-audio').addEventListener('click',function(){
    AUDIO.userMuted=!AUDIO.userMuted;
    this.classList.toggle('on',!AUDIO.userMuted);
    if(AUDIO.ready && AUDIO.userMuted){
      AUDIO.masterGain.gain.setTargetAtTime(0.0,AUDIO.ctx.currentTime,0.15);
    }
    // When unmuted, updateAudio's volume link takes over automatically
  });

  // ── Feedback link: opens the Google Form (set FEEDBACK_FORM_URL above) ──
  document.getElementById('btn-feedback').addEventListener('click',function(e){
    if(!FEEDBACK_FORM_URL || FEEDBACK_FORM_URL.indexOf('YOUR-FORM-ID')>=0){
      e.preventDefault();
      showError('Feedback form not set up yet — add the link in the code.');
      return;
    }
    this.href = FEEDBACK_FORM_URL;   // plain link; no prefill needed
  });
  // Noise slider (settings panel only — no splash twin)
  (function(){
    const lr=document.getElementById('lr-noise'), lv=document.getElementById('lv-noise');
    if(lr&&lv) lr.addEventListener('input',function(){CFG.noise=parseInt(this.value,10);lv.textContent=this.value;});
  })();
  // Photo capture — grabs the composite canvas as PNG
  document.getElementById('btn-photo').addEventListener('click',()=>{
    if(!STATE.cameraOk){showError('Camera not ready yet.');return;}
    try{
      compositeCanvas.toBlob((blob)=>{
        if(!blob){showError('Photo capture failed.');return;}
        saveBlob(blob, 'raster_'+Date.now()+'.png');
      },'image/png');
    }catch(e){showError('Photo capture failed: '+e.message);}
  });
  // Resume AudioContext on any touch (required by iOS Safari).
  // Belt + suspenders: both the canvas and document level.
  const _resumeAudio = () => {
    if (AUDIO.ctx && AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume().catch(()=>{});
  };
  compositeCanvas.addEventListener('touchstart', _resumeAudio, {passive:true});
  document.addEventListener('touchstart', _resumeAudio, {once:false, passive:true});

  // ── Splash → main transition ───────────────────────────────────────────
  async function enterLiveMode(fromGesture){
    // ❶ SYNCHRONOUS — inside a gesture this keeps the audio-unlock privilege.
    // On auto-start (no gesture) the context is created suspended and resumed
    // by the one-time unlock listener below.
    if (!AUDIO.ctx) {
      try {
        AUDIO.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (fromGesture) AUDIO.ctx.resume().catch(()=>{});
      } catch(e) { console.warn('AudioContext pre-init failed:',e); }
    }
    STATE.uploadMode=false;   // ensure clean live mode (re-entrant)
    const recBtn=document.getElementById('btn-record');
    if(recBtn) recBtn.removeAttribute('data-upload');
    const splash=document.getElementById('splash');
    splash.style.opacity='0'; splash.style.transition='opacity 0.4s ease';
    setTimeout(()=>{splash.style.display='none'; if(window._splashAnimStop)window._splashAnimStop();},400);
    const ok=await startCamera();
    if(!ok){splash.style.display='flex';splash.style.opacity='1';splash.style.transition='none';return;}
    const bk=document.getElementById('btn-back'); if(bk) bk.style.display='flex';
    const fl=document.getElementById('btn-flip'); if(fl) fl.style.display='flex';
    STATE.lastDetectT=performance.now(); STATE.fpsT=performance.now();
    if(rafId) cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(loop);
  }
  document.getElementById('btn-start').addEventListener('click',()=>enterLiveMode(true));

  // ── Auto-start: open straight into the camera (native-app behaviour). If the
  //    permission is denied the splash stays as the fallback entry screen.
  enterLiveMode(false);

  // One-time audio unlock: browsers keep an auto-created AudioContext suspended
  // until a user gesture; the first tap anywhere resumes it.
  const _audioUnlock=()=>{ 
    if (AUDIO.ctx && AUDIO.ctx.state==='suspended') AUDIO.ctx.resume().catch(()=>{});
    document.removeEventListener('pointerdown',_audioUnlock);
  };
  document.addEventListener('pointerdown',_audioUnlock);

  // ── HOME button: return to splash, switch modes without reload ─────────
  document.getElementById('btn-back').addEventListener('click',returnToHome);
  document.getElementById('btn-flip').addEventListener('click',flipCamera);
  _perfHud = document.getElementById('perf-hud');
  // Triple-tap the HUD area (top-centre) toggles the performance overlay.
  let _tapCount=0, _tapT=0;
  document.addEventListener('pointerdown', (e)=>{
    if (e.clientY>60 || Math.abs(e.clientX-window.innerWidth/2)>80) return;
    const t=performance.now();
    _tapCount = (t-_tapT<450) ? _tapCount+1 : 1; _tapT=t;
    if (_tapCount>=3){
      STATE.perfOn=!STATE.perfOn; _tapCount=0;
      _perfHud.style.display = STATE.perfOn?'block':'none';
      STATE._perfPrev=performance.now();
    }
  });

  // ── Upload video flow ──────────────────────────────────────────────────
  document.getElementById('btn-upload-splash').addEventListener('click',()=>{
    // AudioContext must be created in the user gesture (iOS)
    if (!AUDIO.ctx) {
      try { AUDIO.ctx = new (window.AudioContext||window.webkitAudioContext)(); AUDIO.ctx.resume().catch(()=>{}); }
      catch(e){}
    }
    document.getElementById('file-input').click();
  });
  document.getElementById('btn-gallery').addEventListener('click',()=>{
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change',function(){
    const f=this.files&&this.files[0];
    if(!f) return;
    // Switching live → upload: release the camera stream first
    if (STATE.camStream){
      STATE.camStream.getTracks().forEach(t=>{ try{t.stop();}catch(e){} });
      STATE.camStream=null; videoEl.srcObject=null;
    }
    STILL.active=false; SRC.active=false;
    if(f.type.startsWith('image/'))      startUploadedImage(f);
    else if(f.type.startsWith('video/')) startUploadedVideo(f);
    else showError('Please choose a video or image file.');
    this.value='';   // allow re-selecting the same file later
  });

  // ── Canvas context loss / restore ──────────────────────────────────────
  compositeCanvas.addEventListener('contextlost',e=>{
    e.preventDefault(); if(rafId){cancelAnimationFrame(rafId);rafId=null;}
    showError('Canvas context lost — please reload.'); STATE.cameraOk=false;
  });
  compositeCanvas.addEventListener('contextrestored',()=>{
    if(STATE.cameraOk){STATE.lastDetectT=performance.now();rafId=requestAnimationFrame(loop);}
  });

  // ── Window resize ──────────────────────────────────────────────────────
  window.addEventListener('resize',()=>{
    if(!STATE.cameraOk) return;
    const _rs=renderSize(window.innerWidth,window.innerHeight);
    const cW=_rs.w, cH=_rs.h;
    compositeCanvas.width=cW; compositeCanvas.height=cH;
    updateCrop(STATE.videoW,STATE.videoH,cW,cH);
    _vigGrad=null; _vigW=0; _vigH=0;
    let pW=240, pH=Math.round(pW*cH/cW);
    if(pW*pH>150000){const s=Math.sqrt(150000/(pW*pH));pW=(pW*s)|0;pH=(pH*s)|0;}
    if(pW!==workCanvas.width||pH!==workCanvas.height){
      workCanvas.width=pW; workCanvas.height=pH;
      initBuffers(pW,pH); STATE.warmup=0;
    }
  });

  // ── Page visibility ────────────────────────────────────────────────────
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
    else if(STATE.cameraOk&&!rafId){
      STATE.warmup=0;STATE.fpsT=performance.now();
      STATE.fpsFrames=0;STATE.lastDetectT=performance.now();
      rafId=requestAnimationFrame(loop);
    }
  });

}); // end DOMContentLoaded
</script>
</body>
